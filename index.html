<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעיצוב לקוד — D2C × UXTRA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    /* ── Almoni Tzar (Hebrew condensed display + body) ── */
    @font-face { font-family:'Almoni Tzar'; src:url('fonts/almoni-tzar-light-aaa.otf') format('opentype'); font-weight:300; font-style:normal; }
    @font-face { font-family:'Almoni Tzar'; src:url('fonts/almoni-tzar-regular-aaa.otf') format('opentype'); font-weight:400; font-style:normal; }
    @font-face { font-family:'Almoni Tzar'; src:url('fonts/almoni-tzar-medium-aaa.otf') format('opentype'); font-weight:500; font-style:normal; }
    @font-face { font-family:'Almoni Tzar'; src:url('fonts/almoni-tzar-demibold-aaa.otf') format('opentype'); font-weight:600; font-style:normal; }
    @font-face { font-family:'Almoni Tzar'; src:url('fonts/almoni-tzar-bold-aaa.otf') format('opentype'); font-weight:700; font-style:normal; }
    @font-face { font-family:'Almoni Tzar'; src:url('fonts/almoni-tzar-ultrabold-aaa.otf') format('opentype'); font-weight:900; font-style:normal; }

    /* ── Design tokens (torq-deck-2 visual language) ── */
    :root{
      --bg-0:#080720; --bg-1:#0e0b30; --bg-2:#160f45;
      --blue:#2f5cff; --blue-bright:#4d7bff; --cyan:#8ff5ff;
      --magenta:#ff27a8; --violet:#a618e9; --green:#00d084;
      --ink:#ffffff; --ink-soft:#c8c4ec; --ink-mute:#7b76a8;
      --line:rgba(255,255,255,.10); --dot:rgba(255,255,255,.16);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      background:var(--bg-0);
      color:var(--ink);
      font-family:'Almoni Tzar', sans-serif;
      overflow:hidden; height:100vh; width:100vw;
      -webkit-font-smoothing:antialiased;
    }

    /* ── Slide system (shared 1920×1080 fixed canvas, scaled to fit) ── */
    .slides-container { position:relative; width:100%; height:100%; }
    .slide { position:absolute; inset:0; opacity:0; pointer-events:none; transition:opacity .5s ease; overflow:hidden; }
    .slide.active { opacity:1; pointer-events:auto; }
    .slide-inner {
      position:absolute; width:1920px; height:1080px;
      top:50%; left:50%; transform-origin:center center;
      background:
        radial-gradient(1400px 820px at 80% -12%, rgba(47,92,255,.22), transparent 60%),
        radial-gradient(1100px 720px at 4% 112%, rgba(166,24,233,.20), transparent 60%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1) 55%, var(--bg-2));
    }

    /* dot-grid texture with rounded radial fade */
    .slide-inner::before{
      content:""; position:absolute; inset:0; pointer-events:none;
      background-image:radial-gradient(circle, var(--dot) 1.6px, transparent 1.7px);
      background-size:34px 34px;
      -webkit-mask-image:radial-gradient(76% 80% at 64% 42%, #000 26%, rgba(0,0,0,.5) 58%, transparent 92%);
              mask-image:radial-gradient(76% 80% at 64% 42%, #000 26%, rgba(0,0,0,.5) 58%, transparent 92%);
      opacity:.9;
    }

    /* ═══════ COVER — UXTRA CLOSE wordmark ═══════ */
    /* aspect-locked stage (image AR 1464×814) centered on the canvas;
       the transparent PNG lets the torq gradient + dot-grid show through. */
    .cover-stage{
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:min(1640px, calc((100% - 0px))); aspect-ratio:1464/814;
      z-index:2;
    }
    .cover-art{ width:100%; height:100%; object-fit:contain; display:block; }
    .cover-label{
      position:absolute; top:12%; left:50%; transform:translateX(-50%); z-index:4;
      font-family:'Almoni Tzar', sans-serif; font-size:24px;
      letter-spacing:.24em; text-transform:uppercase; color:var(--ink-mute);
      white-space:nowrap; direction:ltr;
    }
    .cover-sub{
      position:absolute; top:16%; left:50%; transform:translateX(-50%); z-index:4;
      font-family:'Almoni Tzar', sans-serif; font-weight:500; font-size:52px;
      color:var(--ink-soft); white-space:nowrap; text-align:center; line-height:1;
    }

    /* ═══════ HERO (legacy) ═══════ */
    .hero {
      position:absolute; inset:0; z-index:2;
      display:flex; flex-direction:column; justify-content:center;
      padding:0 150px;
    }

    .eyebrow{
      font-family:'Almoni Tzar', sans-serif; font-weight:500;
      font-size:24px; letter-spacing:.28em; text-transform:uppercase;
      color:var(--cyan); display:flex; align-items:center; gap:16px;
      margin-bottom:44px; direction:ltr;
    }
    .eyebrow .bar{ width:54px; height:3px; background:var(--cyan); box-shadow:0 0 16px var(--cyan); }

    .hero-title{
      font-family:'Almoni Tzar', sans-serif; font-weight:900;
      font-size:360px; line-height:.86; letter-spacing:0;
      color:var(--ink);
    }
    .hero-title .accent{
      color:var(--cyan);
      text-shadow:0 0 60px rgba(143,245,255,.45);
    }

    .hero-sub{
      font-family:'Almoni Tzar', sans-serif; font-weight:500;
      font-size:55.2px; line-height:1.32; color:var(--ink-soft);
      max-width:1000px; margin-top:52px;
    }

    /* presenter profiles */
    .profiles{ display:flex; gap:28px; margin-top:88px; }
    .profile{
      display:flex; align-items:center; gap:20px;
      background:rgba(255,255,255,.045);
      border:1px solid var(--line);
      border-radius:22px; padding:16px 30px 16px 16px;
      backdrop-filter:blur(8px);
    }
    .profile__avatar{
      width:86px; height:86px; border-radius:50%; overflow:hidden;
      flex-shrink:0; position:relative;
      box-shadow:0 0 0 2px rgba(143,245,255,.25);
    }
    .profile__avatar img{ position:absolute; display:block; }
    .profile__avatar--daniel img{ width:136.61%; height:136.61%; left:-19.63%; top:-14.76%; }
    .profile__avatar--hani img{ width:112%; height:112%; left:-6%; top:-6%; object-fit:cover; }
    .profile__name{ font-weight:700; font-size:48px; line-height:1.05; color:var(--ink); }
    .profile__role{ font-family:'Almoni Tzar', sans-serif; font-size:15px; letter-spacing:.12em; color:var(--ink-mute); text-transform:uppercase; margin-top:4px; direction:ltr; text-align:right; }

    /* ═══════ Footer chrome / nav ═══════ */
    .nav-bar{
      position:fixed; bottom:0; left:0; right:0; height:64px;
      display:flex; align-items:center; justify-content:center;
      z-index:1000; background:rgba(8,7,32,.72);
      backdrop-filter:blur(12px); border-top:1px solid var(--line);
      font-family:'Almoni Tzar', sans-serif; font-size:13px;
      letter-spacing:.18em; text-transform:uppercase; color:var(--ink-mute);
    }
    .nav-bar .live{ position:absolute; left:28px; display:flex; align-items:center; gap:10px; }
    .nav-bar .dot{ width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green); animation:pulse 1.8s infinite; }
    @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.3} }
    .nav-home{
      position:absolute; right:28px; display:flex; align-items:center; gap:9px;
      text-decoration:none; color:var(--ink-mute);
      font-family:'Almoni Tzar', sans-serif; font-size:24px; letter-spacing:0;
      text-transform:none; transition:color .2s;
    }
    .nav-home:hover{ color:var(--cyan); }
    .nav-home svg{ width:18px; height:18px; fill:currentColor; }
  </style>
</head>
<body>

<div class="slides-container">
  <div class="slide active" data-slide="0">
    <div class="slide-inner" id="s1-inner">
      <!-- mono eyebrow label -->
      <div class="cover-label">Design&nbsp;to&nbsp;Code — UXTRA</div>
      <div class="cover-sub">מעיצוב לקוד ותהליכי עבודה עם AI</div>
      <!-- UXTRA CLOSE wordmark (aspect-locked so it fills the canvas) -->
      <div class="cover-stage">
        <img class="cover-art" src="assets/uxtra-close.png" alt="UXTRA CLOSE" />
      </div>
    </div>
  </div>
</div>

<!-- Footer chrome -->
<nav class="nav-bar">
  <span class="live"><span class="dot"></span>D2C × UXTRA</span>
  <a href="class-2.html" class="nav-home">
    <svg viewBox="0 0 16 16"><path d="M8 1.4L1 7v7.6h5V10h4v4.6h5V7L8 1.4z"/></svg>
    כל השיעורים
  </a>
</nav>

<script>
  // ── Responsive scaling — design canvas is 1920×1080 ──
  function scaleSlides() {
    const vw = window.innerWidth;
    const vh = window.innerHeight - 64; // minus nav height
    const scale = Math.min(vw / 1920, vh / 1080);
    document.querySelectorAll('.slide-inner').forEach(inner => {
      inner.style.transform = `translate(-50%, -50%) scale(${scale})`;
    });
  }
  scaleSlides();
  window.addEventListener('resize', scaleSlides);
</script>

</body>
</html>
